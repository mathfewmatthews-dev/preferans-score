  <meta property="og:description" content="Откройте общую партию в приложении «Пуля преферанса». Счёт синхронизируется между устройствами.">
  <meta property="og:url" content="https://preferans-score.online/game/">

  <meta name="twitter:image:alt" content="Пуля преферанса — подключиться к общей партии">
  <title>Подключиться к общей партии — Пуля преферанса</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <style>
    :root { color-scheme: dark; font-family: "Segoe UI", Arial, sans-serif; }
    body { min-height: 100vh; display: grid; place-items: center; margin: 0; color: #fff; background: #232a33; }
    main { max-width: 560px; padding: 32px; text-align: center; }
    a { display: inline-block; margin-top: 12px; padding: 14px 22px; color: #18202a; font-weight: 700; text-decoration: none; background: #fff; border-radius: 999px; }
  </style>
</head>
<body>
  <main>
    <h1>Подключение к общей партии</h1>
    <p>Переходим в приложение «Пуля преферанса».</p>
    <a id="openGameLink" href="./">Открыть приложение</a>
  </main>
  <script>
    (() => {
      const params = new URLSearchParams(window.location.search);
      const gameId = String(params.get("game") || params.get("g") || window.location.hash.slice(1) || "").trim();
      const target = new URL("./", window.location.href);
      target.search = "";
      target.hash = "";
      if (/^[A-Za-z0-9_-]{16,64}$/.test(gameId)) target.searchParams.set("game", gameId);
      const href = target.href;
      document.getElementById("openGameLink").href = href;
      window.location.replace(href);
    })();
  </script>
</body>
</html>
